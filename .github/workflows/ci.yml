name: Agentkit CI

on:
  push:
    branches: [ "main" ] # Adjust branch names as needed
    paths:
      - 'agentkit/**'
      - '.github/workflows/agentkit_ci.yml'
  pull_request:
    branches: [ "main" ] # Adjust branch names as needed
    paths:
      - 'agentkit/**'
      - '.github/workflows/agentkit_ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"] # Specify desired Python versions

    defaults:
      run:
        working-directory: ./agentkit # Set working directory for all steps

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Add other linters/tools if needed, e.g., pip install flake8 mypy

    # - name: Lint with flake8 # Uncomment if flake8 is added
    #   run: |
    #     # stop the build if there are Python syntax errors or undefined names
    #     flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    #     # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
    #     flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format with black
      run: |
        black --check .

    # - name: Type check with mypy # Uncomment if mypy is added
    #   run: |
    #     mypy . --ignore-missing-imports

    - name: Test with pytest
      run: |
        pytest
